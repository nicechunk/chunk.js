name: Request a private security contact
description: Ask the maintainers for a private reporting route without disclosing vulnerability details.
title: "[Security contact request]"
body:
  - type: markdown
    attributes:
      value: |
        This issue is public. Do not include vulnerability details, exploit steps, credentials, private data, affected production accounts, or attachments.

        Private vulnerability reporting is not currently enabled for this repository. This form only asks a maintainer to provide a suitable private reporting route. Wait for that route before sharing any sensitive information.

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Public issue acknowledgement
      options:
        - label: I understand that this issue is public and have not included vulnerability details or sensitive information.
          required: true
